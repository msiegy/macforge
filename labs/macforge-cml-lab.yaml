  - boot_disk_size: null
    configuration:
      - name: user-data
        content: |-
          #cloud-config
          hostname: macforge

          system_info:
            default_user:
              name: cisco
          password: cisco
          chpasswd: { expire: False }
          ssh_pwauth: True

          # Standard Public NTP
          ntp:
            enabled: true
            pool: [0.ubuntu.pool.ntp.org, 1.ubuntu.pool.ntp.org]

          runcmd:
            - systemctl restart systemd-timesyncd
            - sleep 10

            - git clone https://github.com/msiegy/macforge.git /home/cisco/macforge
            - chown -R cisco:cisco /home/cisco/macforge

            # HARD-CODE THE INTERFACES HERE
            # This creates the .env file that MACforge and Docker Compose read
            - |
              cat << EOF > /home/cisco/macforge/.env
              MACFORGE_IFACE=ens2
              MACFORGE_DATA_IFACE=ens3
              LOG_LEVEL=verbose
              EOF
            - chown -R cisco:cisco /home/cisco/macforge

            - cd /home/cisco/macforge && bash scripts/setup-vm.sh
      - name: network-config
        content: |-
          #network-config
          version: 2
          ethernets:
            ens2:
              dhcp4: true
            ens3:
              dhcp4: false
              optional: true
