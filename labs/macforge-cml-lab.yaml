lab:
  description: |-
    MACforge 802.1X/MAB Lab

    This lab provides a pre-configured sandbox to test MACforge against a Cisco switch. It automates the setup of a hardened Ubuntu 24.04 node and a Layer 2 switch to simulate real-world NAC (Network Access Control) scenarios.
  notes: ''
  title: Macforge CML Lab
  node_staging:
    enabled: false
    start_remaining: true
    abort_on_failure: false
  version: 0.3.1
