  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          ! --- MACforge CML Lab Switch Template ---
          !
          hostname access-switch
          !
          ! Standard Lab Credentials
          username admin privilege 15 secret cisco123
          !
          Enable secret cisco123
          !
          aaa new-model
          !
          ! RADIUS Configuration
          radius server RADIUS-ISE
           address ipv4 <ISE_IP> auth-port 1812 acct-port 1813
           key <RADIUS_KEY>
          !
          aaa group server radius RADIUS-ISE-GROUP
           server name RADIUS-ISE
          !
          ! AAA & DOT1X Global Config
          aaa authentication login default local
          aaa authentication dot1x default group RADIUS-ISE-GROUP
          aaa authorization network default group RADIUS-ISE-GROUP
          aaa accounting dot1x default start-stop group RADIUS-ISE-GROUP
          !
          aaa server radius dynamic-author
           client <ISE_IP> server-key <RADIUS_KEY>
          !
          dot1x system-auth-control
          device-sensor accounting
          device-sensor notify all-changes
          !
          ! Layer 2 / DHCP Setup (VLAN 101 = Client Traffic)
          vlan 101
           name MACforge-Clients
          vlan 10
           name Management
          !
          ip dhcp pool CLIENTS_VLAN_101
           network 192.168.101.0 255.255.255.0
           default-router 192.168.101.1
           dns-server 8.8.8.8
          !
          ip dhcp snooping vlan 101
          ip dhcp snooping
          !
          ! Management Interface
          interface Vlan10
           description Switch Management
           ip address <SWITCH_MGMT_IP> <MASK>
          !
          ! RADIUS Source Interface
          ip radius source-interface Vlan10
          !
          interface GigabitEthernet0/0
           description UPLINK TO BRIDGE
           switchport mode access
           switchport access vlan 10
           negotiation auto
           no cdp tlv app
           spanning-tree portfast edge trunk
          !
          ! MACforge Client Port (Standard MAB + 802.1X)
          interface GigabitEthernet1/0
           description MACforge-Emulator-Port
           switchport access vlan 101
           switchport mode access
           authentication host-mode multi-auth
           authentication order mab dot1x
           authentication priority mab dot1x
           authentication port-control auto
           authentication periodic
           authentication timer reauthenticate server
           mab
           dot1x pae authenticator
           spanning-tree portfast edge
          !
          ! SVI for Client Gateway
          interface Vlan101
           ip address 192.168.101.1 255.255.255.0
          !
          ip route 0.0.0.0 0.0.0.0 <DEFAULT ROUTE NEXT HOP>
          !
          ! Final System Settings
          ip domain-name ciscolabs.com
          ip http server
          ip http secure-server
          ip ssh version 2
          line vty 0 15
           transport input ssh
           login authentication default
          !
          end
